<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#311b92"/>
      <stop offset="50%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <linearGradient id="cardBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="glow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- Orbs -->
  <circle cx="150" cy="120" r="190" fill="#a855f7" opacity="0.22" filter="url(#glow3)"/>
  <circle cx="680" cy="380" r="210" fill="#c084fc" opacity="0.2" filter="url(#glow3)"/>

  <!-- Lantern Silhouettes -->
  <ellipse cx="140" cy="180" rx="35" ry="45" fill="rgba(255,255,255,0.12)"/>
  <line x1="140" y1="100" x2="140" y2="135" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="140" y1="225" x2="140" y2="250" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Chinese Character Background Pattern -->
  <text x="400" y="320" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="240" font-weight="900" fill="rgba(255,255,255,0.06)" text-anchor="middle">学习</text>

  <!-- Main Card Graphic -->
  <rect x="220" y="100" width="360" height="280" rx="32" fill="url(#cardBg3)" stroke="rgba(255,255,255,0.3)" stroke-width="2" filter="url(#glow3)"/>

  <!-- Character Foreground -->
  <text x="400" y="245" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="110" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow3)">学习</text>
  <text x="400" y="295" font-family="sans-serif" font-size="28" font-weight="600" fill="#e9d5ff" text-anchor="middle" letter-spacing="4">xué xí</text>

  <!-- HSK 3 Badge -->
  <rect x="330" y="330" width="140" height="36" rx="18" fill="#7e22ce"/>
  <text x="400" y="354" font-family="sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">HSK LEVEL 3</text>
</svg>
