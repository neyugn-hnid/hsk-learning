<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="50%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)"/>

  <!-- Decorative Orbs & Waves -->
  <circle cx="100" cy="80" r="180" fill="#34d399" opacity="0.15" filter="url(#glow)"/>
  <circle cx="700" cy="420" r="220" fill="#14b8a6" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Bamboo Silhouettes -->
  <path d="M680 500 V 120 M700 500 V 80 M720 500 V 160" stroke="rgba(255,255,255,0.15)" stroke-width="8" stroke-dasharray="40,4"/>
  <path d="M680 300 Q 640 280 620 290 M700 220 Q 660 200 640 210 M720 380 Q 680 360 660 370" stroke="rgba(255,255,255,0.25)" stroke-width="4" fill="none"/>

  <!-- Chinese Character Background Pattern -->
  <text x="400" y="320" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="240" font-weight="900" fill="rgba(255,255,255,0.06)" text-anchor="middle">你好</text>

  <!-- Main Card Graphic -->
  <rect x="220" y="100" width="360" height="280" rx="32" fill="url(#cardBg)" stroke="rgba(255,255,255,0.3)" stroke-width="2" filter="url(#glow)"/>

  <!-- Character Foreground -->
  <text x="400" y="245" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="110" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">你好</text>
  <text x="400" y="295" font-family="sans-serif" font-size="28" font-weight="600" fill="#a7f3d0" text-anchor="middle" letter-spacing="4">nǐ hǎo</text>

  <!-- HSK 1 Badge -->
  <rect x="330" y="330" width="140" height="36" rx="18" fill="#10b981"/>
  <text x="400" y="354" font-family="sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">HSK LEVEL 1</text>
</svg>
