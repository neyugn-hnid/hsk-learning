<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="50%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Orbs -->
  <circle cx="700" cy="100" r="200" fill="#38bdf8" opacity="0.18" filter="url(#glow2)"/>
  <circle cx="120" cy="400" r="180" fill="#0284c7" opacity="0.25" filter="url(#glow2)"/>

  <!-- Pagoda Roof Silhouette -->
  <path d="M 300 480 L 400 400 L 500 480 Z" fill="rgba(255,255,255,0.04)"/>
  <path d="M 240 500 Q 400 420 560 500" stroke="rgba(255,255,255,0.15)" stroke-width="6" fill="none"/>

  <!-- Chinese Character Background Pattern -->
  <text x="400" y="320" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="240" font-weight="900" fill="rgba(255,255,255,0.06)" text-anchor="middle">谢谢</text>

  <!-- Main Card Graphic -->
  <rect x="220" y="100" width="360" height="280" rx="32" fill="url(#cardBg2)" stroke="rgba(255,255,255,0.3)" stroke-width="2" filter="url(#glow2)"/>

  <!-- Character Foreground -->
  <text x="400" y="245" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="110" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow2)">谢谢</text>
  <text x="400" y="295" font-family="sans-serif" font-size="28" font-weight="600" fill="#bae6fd" text-anchor="middle" letter-spacing="4">xiè xie</text>

  <!-- HSK 2 Badge -->
  <rect x="330" y="330" width="140" height="36" rx="18" fill="#0284c7"/>
  <text x="400" y="354" font-family="sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">HSK LEVEL 2</text>
</svg>
